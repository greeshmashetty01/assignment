<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gushwork Assignment</title>
    <link href="ass.css" rel="stylesheet">
</head>
<body>

    <!-- Top Header -->
    <header class="top-header">
        <div class="container">
            <h1 class="logo">BrandName</h1>
            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Products</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Sticky Header -->
    <header class="sticky-header" id="stickyHeader">
        <div class="container">
            <h2 class="logo">BrandName</h2>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Modern Web Experience</h2>
        <p>Responsive Design with Sticky Header & Carousel</p>
    </section>

    <!-- Image Carousel Section -->
    <section class="carousel-section">
        <h2>Our Collection</h2>

        <div class="carousel">
            <button class="prev">&#10094;</button>

            <div class="carousel-track-container">
                <div class="carousel-track">
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/id/1015/800/500" alt="Image 1">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/id/1016/800/500" alt="Image 2">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/id/1018/800/500" alt="Image 3">
                    </div>
                </div>
            </div>

            <button class="next">&#10095;</button>
        </div>
    </section>
    

    <script src="ass.js"></script>
</body>
</html>
